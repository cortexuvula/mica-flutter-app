name: Build All Platforms

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.4'

jobs:
  # ─── Analyze & Test ───────────────────────────────────────────
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  # ─── Android ──────────────────────────────────────────────────
  build-android:
    name: Build Android
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  # ─── iOS ──────────────────────────────────────────────────────
  build-ios:
    name: Build iOS
    needs: analyze-and-test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Archive iOS build
        run: |
          cd build/ios/iphoneos
          tar -czf ../../../ios-build.tar.gz Runner.app

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ios-build.tar.gz

  # ─── macOS (signed + notarized) ───────────────────────────────
  build-macos:
    name: Build macOS
    needs: analyze-and-test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # ── Import code-signing certificate ──
      - name: Install certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          # Decode certificate
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12

          # Create temporary keychain
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain

          # Import certificate
          security import certificate.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$MACOS_KEYCHAIN_PASSWORD" build.keychain

          # Clean up
          rm certificate.p12

      - name: Build macOS
        run: flutter build macos --release

      # ── Code sign the app ──
      - name: Code sign app
        run: |
          APP_PATH="build/macos/Build/Products/Release/mica.app"
          # Sign all frameworks and dylibs first, then the app itself
          find "$APP_PATH" -name "*.framework" -o -name "*.dylib" | while read f; do
            codesign --deep --force --verify --verbose \
              --sign "Developer ID Application" \
              --options runtime \
              "$f"
          done
          codesign --deep --force --verify --verbose \
            --sign "Developer ID Application" \
            --options runtime \
            "$APP_PATH"

      # ── Notarize ──
      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="build/macos/Build/Products/Release/mica.app"

          # Create a zip for notarization
          ditto -c -k --keepParent "$APP_PATH" mica-notarize.zip

          # Submit for notarization and wait
          xcrun notarytool submit mica-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the notarization ticket to the app
          xcrun stapler staple "$APP_PATH"

          rm mica-notarize.zip

      - name: Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/mica.app"
          hdiutil create -volname "MICA" -srcfolder "$APP_PATH" \
            -ov -format UDZO mica-macos.dmg

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: mica-macos.dmg

  # ─── Windows ──────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    needs: analyze-and-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Archive Windows build
        run: tar -czf windows-build.tar.gz -C build/windows/x64/runner/Release .

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: windows-build.tar.gz

  # ─── Linux ────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libasound2-dev libmpv-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Archive Linux build
        run: tar -czf linux-build.tar.gz -C build/linux/x64/release/bundle .

      - name: Upload Linux build
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: linux-build.tar.gz

  # ─── Web ──────────────────────────────────────────────────────
  build-web:
    name: Build Web
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web

      - name: Archive Web build
        run: tar -czf web-build.tar.gz -C build/web .

      - name: Upload Web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web-build.tar.gz

  # ─── Upload to GitHub Release ────────────────────────────────
  upload-release-assets:
    name: Upload Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-ios, build-macos, build-windows, build-linux, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" \
            artifacts/android-apk/app-release.apk \
            artifacts/android-aab/app-release.aab \
            artifacts/ios-build/ios-build.tar.gz \
            artifacts/macos-build/mica-macos.dmg \
            artifacts/windows-build/windows-build.tar.gz \
            artifacts/linux-build/linux-build.tar.gz \
            artifacts/web-build/web-build.tar.gz \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
