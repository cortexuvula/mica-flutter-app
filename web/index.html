<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="mica">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>mica</title>
  <!-- Temporarily comment out manifest to avoid CORS errors during development -->
  <!-- <link rel="manifest" href="manifest.json"> -->

  <style>
    /* Splash screen styles */
    #splash {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
      background: linear-gradient(to bottom, #ede9fe, #aba9e9);
      color: #333;
      font-family: 'Roboto', sans-serif;
      transition: opacity 0.4s ease;
    }
    #splash img {
      width: 200px;
      height: 200px;
      margin-bottom: 20px;
    }
    #splash .loading-indicator {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      border-top-color: #64638f;
      animation: spin 1s linear infinite;
      margin-top: 20px;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    #splash .app-name {
      font-size: 24px;
      font-weight: bold;
      margin-top: 10px;
    }
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!-- Splash screen container -->
  <div id="splash">
    <!-- Use base64 encoded image to avoid CORS and path issues -->
    <div style="width:200px; height:200px; background-color:#64638f; border-radius:16px; display:flex; align-items:center; justify-content:center; color:white; font-size:36px; font-weight:bold;">MCA</div>
    <div class="app-name">Midland Cognitive Assessment</div>
    <div class="loading-indicator"></div>
  </div>

  <script>
    // Simple splash screen script that works in all environments
    window.onload = function() {
      // Wait a brief moment to ensure Flutter gets a chance to initialize first
      setTimeout(function() {
        var splash = document.getElementById('splash');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(function() {
            if (splash && splash.parentNode) {
              splash.parentNode.removeChild(splash);
            }
          }, 400);
        }
      }, 2000);
    };
  </script>
  
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
